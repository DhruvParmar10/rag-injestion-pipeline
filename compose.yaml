version: '3.8'

services:
  # 1. PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pipeline-postgres
    environment:
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pipeline_password
      POSTGRES_DB: vectordb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_user -d vectordb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Apache Kafka (Official, Free, KRaft Mode)
  kafka:
    image: apache/kafka:latest
    container_name: pipeline-kafka
    user: root # <-- Add this line to fix the AccessDeniedException
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/tmp/kafka-logs

  # 3. Kafka UI for visual debugging
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: pipeline-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # 4. Ollama Engine
  # 1st time: docker exec -it pipeline-ollama ollama run qwen3-embedding
  ollama:
    image: ollama/ollama:latest
    container_name: pipeline-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  kafka_data:
  ollama_data: