server:
  port: 8081

spring:
  application:
    name: rag-ingestion-pipeline

  # Database Connection
  datasource:
    url: jdbc:postgresql://localhost:5432/vectordb
    username: pipeline_user
    password: pipeline_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Kafka Infrastructure
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      group-id: ingestion-core-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.dhruvp10.ragingestionpipeline.domain"
      enable-auto-commit: false # Manual offset management for processing resilience

# Core Custom Configuration for Local AI Embedding Engine
pipeline:
  ai:
    ollama:
      base-url: http://localhost:11434
      model-name: qwen3-embedding